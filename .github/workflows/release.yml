name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write  # PyPI trusted publishing

jobs:
  pypi:
    # Requires one-time setup: add this repo as a "trusted publisher" for the
    # arabic-pdf2ebook project on pypi.org. Until then this job fails politely
    # without blocking the Windows exe build.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build standalone exe
        run: |
          python -m pip install -e . pyinstaller
          pyinstaller packaging/pdf2ebook.spec
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pdf2ebook.exe
